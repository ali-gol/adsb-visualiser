name: Build and Release ModernRadar

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  # STEP 1: Build Frontend assets once and prepare wwwroot
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular UI
        run: |
          cd ModernRadar.WebUI
          npm ci
          npm run build -- --configuration production

      - name: Upload Prepared wwwroot
        uses: actions/upload-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

  # STEP 2: Parallel publish for all target platforms
  build-and-release:
    needs: prepare-assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: 
          - win-x64
          - osx-x64
          - osx-arm64
          - linux-x64
          - linux-x86
          - linux-arm
          - linux-arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Prepared wwwroot
        uses: actions/download-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Single File)
        run: |
          cd ModernRadar.Host
          # We skip BuildAngularUI target because we already provided the compiled assets
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:BuildAngularUI=false -o ../publish/${{ matrix.rid }}

      - name: Zip Release Files
        run: |
          cd publish/${{ matrix.rid }}
          zip -r
