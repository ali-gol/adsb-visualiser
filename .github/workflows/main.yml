name: Build and Release ModernRadar

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # 1. ADIM: Frontend build al ve wwwroot'u hazırla
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular UI
        run: |
          cd ModernRadar.WebUI
          npm ci
          npm run build -- --configuration production
        # Not: Build çıktısının ModernRadar.Host/wwwroot klasörüne gittiğinden emin ol

      - name: Upload Prepared wwwroot
        uses: actions/upload-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

  # 2. ADIM: Tüm platformlar için publish yap
  build-and-release:
    needs: prepare-assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: 
          - win-x64
          - osx-x64
          - osx-arm64
          - linux-x64
          - linux-x86
          - linux-arm
          - linux-arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Prepared wwwroot
        uses: actions/download-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Single File)
        run: |
          cd ModernRadar.Host
          # CSPROJ içindeki BuildAngularUI target'ını atlıyoruz çünkü biz zaten build aldık
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:BuildAngularUI=false -o ../publish/${{ matrix.rid }}

      - name: Zip Release Files
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../ModernRadar-${{ matrix.rid }}.zip .

      - name: Upload Per-Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.rid }}
          path: ModernRadar-${{ matrix.rid }}.zip

  # 3. ADIM: Tüm dosyaları tek bir Release altında topla
  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download All Zips
        uses: actions/download-artifact@v4
        with:
          path: all-zips
          pattern: zip-*
          merge-multiple: true

      - name: Generate Release Tag
        run: echo "RELEASE_TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          files: all-zips/*.zip
          body: |
            🚀 **ModernRadar Auto-Release**
            
            Multi-platform binaries built with .NET 10.
            - Windows, macOS, Linux (x64, ARM)
            - Fully standalone (Self-contained)
