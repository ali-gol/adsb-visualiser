name: Build and Release ModernRadar

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write # Essential for creating releases and tags

jobs:
  # STEP 1: Build Frontend assets once and prepare wwwroot
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular UI
        run: |
          cd ModernRadar.WebUI
          npm ci
          npm run build -- --configuration production

      - name: Upload Prepared wwwroot
        uses: actions/upload-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

  # STEP 2: Parallel publish for all supported target platforms
  build-and-release:
    needs: prepare-assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: 
          - win-x64
          - osx-x64
          - osx-arm64
          - linux-x64
          - linux-arm
          - linux-arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Prepared wwwroot
        uses: actions/download-artifact@v4
        with:
          name: compiled-wwwroot
          path: ModernRadar.Host/wwwroot/

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Single File)
        run: |
          cd ModernRadar.Host
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:BuildAngularUI=false -o ../publish/${{ matrix.rid }}

      - name: Zip Release Files
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../ModernRadar-${{ matrix.rid }}.zip .

      - name: Upload Per-Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.rid }}
          path: ModernRadar-${{ matrix.rid }}.zip

  # STEP 3: Aggregate all binaries and create the GitHub Release
  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download All Zips
        uses: actions/download-artifact@v4
        with:
          path: all-zips
          pattern: zip-*
          merge-multiple: true

      - name: Set Release Tag
        id: vars
        run: echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          files: all-zips/*.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            🚀 **ModernRadar Production Build**
            
            Multi-platform standalone binaries for ModernRadar.
            - Includes embedded Angular frontend.
            - No .NET runtime required (Self-contained).
